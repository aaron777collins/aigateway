services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: aigateway-litellm
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command:
      - "--config"
      - "/app/config.yaml"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "4000"
      - "--detailed_debug"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4000/health/liveliness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  aigateway-proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: aigateway-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:4003:4003"
    volumes:
      - ./litellm_config.yaml:/config/litellm_config.yaml:ro
    environment:
      LITELLM_HOST: litellm
      LITELLM_PORT: "4000"
      CONFIG_PATH: /config/litellm_config.yaml
      PORT: "4003"
    depends_on:
      - litellm
    networks:
      - internal

  aigateway-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: aigateway-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:4002:4002"
    volumes:
      # Config file is writable so the UI can save changes
      - ./litellm_config.yaml:/config/litellm_config.yaml
      # Docker socket gives the UI permission to restart the litellm container
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CONFIG_PATH: /config/litellm_config.yaml
      LITELLM_URL: http://litellm:4000
      LITELLM_CONTAINER: aigateway-litellm
      LITELLM_KEY: "${LITELLM_MASTER_KEY}"
      PORT: "4002"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - litellm
    networks:
      - internal

networks:
  internal:
    external: true
